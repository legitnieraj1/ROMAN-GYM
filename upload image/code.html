<div class="md:col-span-8 bg-surface-container-lowest p-8 flex flex-col justify-end group border-l-2 border-transparent focus-within:border-primary transition-colors">

<input class="bg-transparent border-none p-0 font-headline text-3xl font-bold text-on-surface focus:ring-0 w-full placeholder:opacity-20" placeholder="Enter Name" type="text" value="MARCUS AURELIUS"/>

<div class="md:col-span-4 bg-surface-container-lowest p-8 flex flex-col justify-end group border-l-2 border-transparent focus-within:border-primary transition-colors">

<div class="flex items-baseline gap-2">
<input class="bg-transparent border-none p-0 font-headline text-3xl font-bold text-on-surface focus:ring-0 w-20 placeholder:opacity-20" placeholder="00" type="number" value="32"/>

<div class="flex items-baseline justify-between">
<input class="bg-transparent border-none p-0 font-headline text-5xl font-bold text-on-surface focus:ring-0 w-full placeholder:opacity-20" placeholder="00.0" step="0.1" type="number" value="88.5"/>
